name: Publish to NPM

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to commit changes back to the repo
      id-token: write # Needed for provenance
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches all history for tagging/committing

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Update package.json version from Tag
        run: |
          # Strip the 'v' from the tag (e.g., v1.0.5 -> 1.0.5)
          VERSION=${GITHUB_REF_NAME#v}
          echo "Updating package.json to version $VERSION"
          
          # Use npm version to update package.json without creating a new git tag
          npm version $VERSION --no-git-tag-version

      - name: Commit and Push version bump
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: bump version to ${GITHUB_REF_NAME}"
          git push

      - name: Install dependencies
        run: npm ci

      - name: Publish to NPM
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
