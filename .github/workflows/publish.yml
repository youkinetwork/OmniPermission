name: Publish to NPM

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to commit changes back to the repo
      id-token: write # Needed for provenance (OIDC)
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Check out the branch instead of just the tag to avoid "Detached HEAD"
          ref: main 
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Update package.json version from Tag
        run: |
          # Strip the 'v' from the tag (e.g., v1.0.1 -> 1.0.1)
          VERSION=${GITHUB_REF_NAME#v}
          echo "Updating package.json to version $VERSION"
          
          # Update version in package.json without creating a new git tag
          npm version $VERSION --no-git-tag-version

      - name: Commit and Push version bump
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: bump version to ${GITHUB_REF_NAME}"
          # Push the local update back to the main branch
          git push origin HEAD:main

      - name: Install dependencies
        run: npm ci

      - name: Publish to NPM
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
