name: Publish to NPM

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write 
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main 
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }} 

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Sync Versions (package.json & openclaw.plugin.json)
        run: |
          NEW_VERSION=${GITHUB_REF_NAME#v}
          echo "Target version: $NEW_VERSION"

          # Update package.json
          npm version $NEW_VERSION --no-git-tag-version || echo "package.json already at $NEW_VERSION"

          # Update openclaw.plugin.json using jq
          if [ -f openclaw.plugin.json ]; then
            # Create a temp file with the updated version
            jq ".version = \"$NEW_VERSION\"" openclaw.plugin.json > openclaw.plugin.json.tmp
            mv openclaw.plugin.json.tmp openclaw.plugin.json
            echo "Updated openclaw.plugin.json to $NEW_VERSION"
          fi

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json openclaw.plugin.json
          
          # Only commit if there are actual changes to prevent "nothing to commit" errors
          if ! git diff --cached --exit-code; then
            git commit -m "chore: bump version to ${GITHUB_REF_NAME} [skip ci]"
            git push origin HEAD:main
          else
            echo "No version changes detected in files. Skipping push."
          fi

      - name: Publish to NPM
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
